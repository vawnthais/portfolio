<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mặt Bậc Hai — Hình Minh Hoạ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #10101a;
    --border: #1e1e30;
    --accent: #7c6af7;
    --accent2: #f76c6c;
    --accent3: #6cf7c8;
    --text: #e8e8f0;
    --muted: #6a6a88;
    --gold: #f0c060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 24px auto 0;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    padding: 24px 32px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 16px 48px rgba(124,106,247,0.15);
  }

  .card-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent);
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 10;
  }

  .canvas-wrap {
    width: 100%;
    height: 220px;
    background: radial-gradient(ellipse at 50% 60%, #12122a 0%, #0a0a0f 100%);
    cursor: grab;
    position: relative;
  }
  .canvas-wrap:active { cursor: grabbing; }
  .canvas-wrap canvas { width: 100% !important; height: 100% !important; }

  .card-body { padding: 18px 20px 20px; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
  }

  .card-eq {
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 10px;
    font-style: italic;
  }

  .card-desc {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .tag-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .tag {
    font-size: 0.62rem;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    border: 1px solid;
  }
  .tag-green  { color: var(--accent3); border-color: rgba(108,247,200,0.25); background: rgba(108,247,200,0.05); }
  .tag-red    { color: var(--accent2); border-color: rgba(247,108,108,0.25); background: rgba(247,108,108,0.05); }
  .tag-purple { color: var(--accent);  border-color: rgba(124,106,247,0.25); background: rgba(124,106,247,0.05); }
  .tag-gold   { color: var(--gold);    border-color: rgba(240,192,96,0.25);  background: rgba(240,192,96,0.05); }

  .tip {
    text-align: center;
    color: var(--muted);
    font-size: 0.68rem;
    padding-bottom: 16px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <h1>Mặt Bậc Hai Đặc Trưng</h1>
  <p class="subtitle">Kéo để xoay · Cuộn để phóng to</p>
</header>

<p class="tip">↕ Kéo chuột trên mỗi hình để xoay 3D</p>

<div class="grid" id="grid"></div>

<script>
// ─── Surface definitions ───────────────────────────────────────────────
const surfaces = [
  {
    name: 'Ellipsoid',
    eq: 'x²/a² + y²/b² + z²/c² = 1',
    desc: 'Mặt kín, mọi vết đều là elip hoặc điểm. Trường hợp đặc biệt: a=b=c cho mặt cầu.',
    badge: 'Ellipsoid',
    tags: [['Mặt kín','green'],['3 trục','purple'],['Elip','gold']],
    color: 0x7c6af7,
    build: (geo) => {
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
        const r=Math.sqrt(x*x+y*y+z*z)||1;
        pos.setXYZ(i, 1.5*x/r, y/r, 0.8*z/r);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Paraboloid Elliptic',
    eq: 'z = x²/a² + y²/b²',
    desc: 'Mở về một phía. Vết nằm ngang là elip, vết đứng là parabol. Đỉnh tại gốc tọa độ.',
    badge: 'Paraboloid',
    tags: [['Mặt hở','red'],['Elip','gold'],['Parabol','purple']],
    color: 0x6cf7c8,
    build: (geo) => {
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),z=pos.getZ(i);
        const y=pos.getY(i);
        pos.setXYZ(i, x, y, x*x*0.5 + y*y*0.5);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Paraboloid Hyperbolic',
    eq: 'z = x²/a² − y²/b²',
    desc: 'Yên ngựa (saddle surface). Vết z=k là hyperbola, vết nằm dọc là parabol ngược chiều.',
    badge: 'Yên ngựa',
    tags: [['Hyperbola','red'],['Parabol','purple'],['Saddle','green']],
    color: 0xf76c6c,
    build: (geo) => {
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),y=pos.getY(i);
        pos.setXYZ(i, x, y, x*x*0.5 - y*y*0.5);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Hyperboloid 1 Tầng',
    eq: 'x²/a² + y²/b² − z²/c² = 1',
    desc: 'Mặt liên thông. Eo ở giữa, vết nằm ngang là elip, vết đứng là hyperbola.',
    badge: 'Hyperboloid 1T',
    tags: [['Liên thông','green'],['Hyperbola','red'],['Eo giữa','gold']],
    color: 0xf0c060,
    build: (geo,scene) => {
      // parametric: x=a*cosh(v)*cos(u), y=b*cosh(v)*sin(u), z=c*sinh(v)
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
        // map sphere to hyperboloid1
        const lon=Math.atan2(y,x);
        const v=(z)*1.5;
        const r=Math.cosh(v);
        pos.setXYZ(i, r*Math.cos(lon), r*Math.sin(lon), Math.sinh(v)*0.8);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Hyperboloid 2 Tầng',
    eq: '−x²/a² − y²/b² + z²/c² = 1',
    desc: 'Hai tầng riêng biệt (không liên thông). Không cắt mặt phẳng z=0. Mỗi tầng là một "bát".',
    badge: 'Hyperboloid 2T',
    tags: [['2 tầng','red'],['Hyperbola','purple'],['Không liên thông','gold']],
    color: 0xff9966,
    build: (geo) => {
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
        const lon=Math.atan2(y,x);
        // only upper sheet: z = cosh(v), r = sinh(v)
        const v=Math.abs(z)*1.2+0.1;
        const sign = z>=0?1:-1;
        const rr=Math.sinh(v)*0.7;
        pos.setXYZ(i, rr*Math.cos(lon), rr*Math.sin(lon), sign*Math.cosh(v)*0.9);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Nón Bậc Hai',
    eq: 'x²/a² + y²/b² − z²/c² = 0',
    desc: 'Hai nón đối đỉnh tại gốc tọa độ. Vết nằm ngang là elip, vết đứng là hyperbola hoặc đường thẳng.',
    badge: 'Nón / Cone',
    tags: [['Đỉnh','gold'],['Elip','green'],['Hyperbola','red']],
    color: 0x66aaff,
    build: (geo) => {
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
        const lon=Math.atan2(y,x);
        const h=z; const r=Math.abs(h)*0.8;
        pos.setXYZ(i, r*Math.cos(lon), r*Math.sin(lon), h);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Trụ Elliptic',
    eq: 'x²/a² + y²/b² = 1',
    desc: 'Mặt trụ song song trục Oz. Vết nằm ngang là elip không đổi theo z. Thiếu z².',
    badge: 'Trụ / Cylinder',
    tags: [['Elip','gold'],['Song song Oz','purple'],['Thiếu z²','green']],
    color: 0xc084fc,
    build: (geo) => {
      const pos = geo.attributes.position;
      for (let i=0;i<pos.count;i++){
        let x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
        const lon=Math.atan2(y,x);
        pos.setXYZ(i, 1.3*Math.cos(lon), Math.sin(lon), z);
      }
      geo.computeVertexNormals();
    }
  },
  {
    name: 'Mặt Cầu',
    eq: 'x² + y² + z² = r²',
    desc: 'Trường hợp đặc biệt của Ellipsoid với a=b=c=r. Mọi vết đều là đường tròn.',
    badge: 'Sphere',
    tags: [['Mặt kín','green'],['Tròn xoay','purple'],['a=b=c','gold']],
    color: 0x4ade80,
    build: (geo) => { geo.computeVertexNormals(); } // sphere is default
  },
];

// ─── Three.js scene per card ───────────────────────────────────────────
function makeScene(container, surface) {
  const W = container.clientWidth || 320;
  const H = container.clientHeight || 220;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(3, 2.5, 3);
  camera.lookAt(0,0,0);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));
  const d1 = new THREE.DirectionalLight(0xffffff, 0.8);
  d1.position.set(5,8,5); scene.add(d1);
  const d2 = new THREE.DirectionalLight(surface.color, 0.5);
  d2.position.set(-5,-3,-5); scene.add(d2);
  const pt = new THREE.PointLight(surface.color, 1, 20);
  pt.position.set(2,3,2); scene.add(pt);

  // Grid helper
  const grid = new THREE.GridHelper(4, 8, 0x222244, 0x1a1a30);
  grid.position.y = -1.5;
  scene.add(grid);

  // Axes
  const axMat = c => new THREE.LineBasicMaterial({color:c,transparent:true,opacity:0.5});
  const axGeo = (a,b) => { const g=new THREE.BufferGeometry(); g.setFromPoints([new THREE.Vector3(...a),new THREE.Vector3(...b)]); return g; };
  scene.add(new THREE.Line(axGeo([-2,0,0],[2,0,0]), axMat(0xff4444)));
  scene.add(new THREE.Line(axGeo([0,-2,0],[0,2,0]), axMat(0x44ff44)));
  scene.add(new THREE.Line(axGeo([0,0,-2],[0,0,2]), axMat(0x4444ff)));

  // Surface mesh
  const geo = new THREE.SphereGeometry(1, 48, 48);
  surface.build(geo, scene);

  const mat = new THREE.MeshPhongMaterial({
    color: surface.color,
    emissive: new THREE.Color(surface.color).multiplyScalar(0.1),
    shininess: 80,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide,
    wireframe: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Wireframe overlay
  const wfMat = new THREE.MeshBasicMaterial({
    color: surface.color,
    wireframe: true,
    transparent: true,
    opacity: 0.12,
  });
  scene.add(new THREE.Mesh(geo.clone(), wfMat));

  // Drag to rotate
  let isDragging = false, prevX = 0, prevY = 0;
  let rotX = 0.3, rotY = 0.5;

  container.addEventListener('mousedown', e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; });
  window.addEventListener('mouseup', () => isDragging=false);
  container.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - prevX) * 0.01;
    rotX += (e.clientY - prevY) * 0.01;
    prevX=e.clientX; prevY=e.clientY;
  });

  // Touch
  container.addEventListener('touchstart', e => { isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; });
  window.addEventListener('touchend', () => isDragging=false);
  container.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotY += (e.touches[0].clientX - prevX) * 0.01;
    rotX += (e.touches[0].clientY - prevY) * 0.01;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  });

  // Scroll zoom
  container.addEventListener('wheel', e => {
    camera.position.multiplyScalar(1 + e.deltaY * 0.001);
    e.preventDefault();
  }, {passive:false});

  let frame;
  function animate() {
    frame = requestAnimationFrame(animate);
    if (!isDragging) rotY += 0.004;
    mesh.rotation.x = rotX;
    mesh.rotation.y = rotY;
    renderer.render(scene, camera);
  }
  animate();

  // Resize
  const ro = new ResizeObserver(() => {
    const w=container.clientWidth, h=container.clientHeight;
    renderer.setSize(w,h);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  });
  ro.observe(container);
}

// ─── Build cards ───────────────────────────────────────────────────────
const grid = document.getElementById('grid');

surfaces.forEach(s => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-badge">${s.badge}</div>
    <div class="canvas-wrap" id="cw-${s.name.replace(/\s/g,'_')}"></div>
    <div class="card-body">
      <div class="card-title">${s.name}</div>
      <div class="card-eq">${s.eq}</div>
      <div class="card-desc">${s.desc}</div>
      <div class="tag-list">
        ${s.tags.map(([t,c])=>`<span class="tag tag-${c}">${t}</span>`).join('')}
      </div>
    </div>
  `;
  grid.appendChild(card);

  requestAnimationFrame(() => {
    const wrap = card.querySelector('.canvas-wrap');
    makeScene(wrap, s);
  });
});
</script>
</body>
</html>
